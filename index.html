<!DOCTYPE html><html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Гришка AI</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:radial-gradient(circle at top,#1c1c1e,#0f0f10 70%);
  color:#fff;
}
.app{
  max-width:420px;
  margin:0 auto;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  padding-bottom:90px;
}
.glass{
  background:rgba(28,28,30,.6);
  backdrop-filter:blur(30px);
  -webkit-backdrop-filter:blur(30px);
  border:1px solid rgba(255,255,255,.05);
  border-radius:22px;
}
.page{flex:1;padding:18px;display:none}
.page.active{display:block}.section-title{font-size:18px;font-weight:700;margin:6px 0 12px}

.chat-box{ height:60vh; overflow:auto; padding:14px; margin-bottom:14px; } .msg{ padding:12px 14px; border-radius:18px; margin:8px 0; max-width:85%; font-size:15px; } .user{background:#0088cc;margin-left:auto} .bot{background:#2a2a2d}

.input-row{display:flex;gap:10px} .input{ flex:1; padding:14px; border:none; border-radius:18px; background:#1f1f22; color:#fff; outline:none; } .send-btn{ width:52px; border:none; border-radius:18px; background:#00bfff; color:#fff; display:flex; align-items:center; justify-content:center; }

.profile-card{ padding:22px; } .avatar{ width:90px; height:90px; border-radius:50%; object-fit:cover; border:3px solid rgba(255,255,255,.15); margin-bottom:12px; }

.info-card{ padding:12px; margin-bottom:10px; font-size:12px; }

.bottom-nav{ position:fixed; bottom:0; left:0; right:0; max-width:420px; margin:0 auto; display:flex; justify-content:space-around; padding:12px 0; border-radius:22px 22px 0 0; } .nav-btn{ background:none; border:none; color:#aaa; display:flex; flex-direction:column; align-items:center; font-size:12px; gap:6px; } .nav-btn.active{color:#00bfff} </style>

</head>
<body><div class="app">  <!-- CHAT -->  <div id="home" class="page active">
    <div class="section-title">Гришка AI</div><div id="chatBox" class="chat-box glass">
  <div class="msg bot">Привет 👋 Я Гришка AI</div>
</div>

<div class="input-row">
  <input id="messageInput" class="input" placeholder="Напиши сообщение..." />
  <button class="send-btn" onclick="sendMessage()">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 2L11 13"/>
      <path d="M22 2L15 22L11 13L2 9L22 2Z"/>
    </svg>
  </button>
</div>

  </div>  <!-- PROFILE -->  <div id="profile" class="page">
    <div class="profile-card glass">
      <img id="avatar" class="avatar" />
      <div id="profileData">Загрузка...</div>
    </div>
  </div>  <!-- SETTINGS -->  <div id="settings" class="page">
    <div class="section-title">Все данные Telegram WebApp</div>
    <div id="telegramInfo"></div>
  </div></div><!-- NAV --><div class="bottom-nav glass">  <button class="nav-btn active" onclick="switchPage('home',this)">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M3 10L12 3l9 7v10a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/></svg>
    Чат
  </button>  <button class="nav-btn" onclick="switchPage('profile',this)">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5zm0 2c-4.4 0-8 2.2-8 5v1h16v-1c0-2.8-3.6-5-8-5z"/></svg>
    Профиль
  </button>  <button class="nav-btn" onclick="switchPage('settings',this)">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M12 8a4 4 0 100 8 4 4 0 000-8zm8 4a7 7 0 00-.1-1l2.1-1.6-2-3.4-2.5 1a7 7 0 00-1.7-1L13.5 2h-3L9.2 5a7 7 0 00-1.7 1l-2.5-1-2 3.4L5.1 11a7 7 0 000 2l-2.1 1.6 2 3.4 2.5-1a7 7 0 001.7 1l1.3 3h3l1.3-3a7 7 0 001.7-1l2.5 1 2-3.4-2.1-1.6c.1-.3.1-.7.1-1z"/></svg>
    Ещё
  </button></div><script>
const tg = window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();}

function switchPage(id,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  if(id==='profile') loadProfile();
  if(id==='settings') loadInfo();
}

async function sendMessage(){
  const input=document.getElementById('messageInput');
  const text=input.value.trim();
  if(!text) return;

  addMsg(text,'user');
  input.value='';

  try{
    // ❌ УБРАН sendData (он закрывал WebApp)

    const res = await fetch('/api/message',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({text})
    });

    const data = await res.json();
    addMsg(data.reply || 'Нет ответа','bot');

  }catch(e){
    addMsg('Ошибка backend (не подключён)','bot');
  }
}

function addMsg(t,type){
  const box=document.getElementById('chatBox');
  const d=document.createElement('div');
  d.className='msg '+type;
  d.textContent=t;
  box.appendChild(d);
  box.scrollTop=box.scrollHeight;
}

function loadProfile(){
  const u=tg?.initDataUnsafe?.user;
  const img=document.getElementById('avatar');

  if(u){
    img.src=u.photo_url || 'https://ui-avatars.com/api/?name='+u.first_name;
    document.getElementById('profileData').innerHTML=
      `<b>${u.first_name||''} ${u.last_name||''}</b><br>@${u.username||'нет'}<br>ID: ${u.id}`;
  }
}

function loadInfo(){
  const u=tg?.initDataUnsafe?.user;

  const info = {
    platform: tg?.platform,
    version: tg?.version,
    webview_version: navigator.userAgent,
    colorScheme: tg?.colorScheme,
    viewportHeight: tg?.viewportHeight,
    viewportStableHeight: tg?.viewportStableHeight,
    isExpanded: tg?.isExpanded,
    language: u?.language_code,
    id: u?.id,
    username: u?.username,
    first_name: u?.first_name,
    last_name: u?.last_name,
    is_premium: u?.is_premium,
    user_agent: navigator.userAgent,
    platform_detected: /Android/i.test(navigator.userAgent) ? 'Android' : /iPhone/i.test(navigator.userAgent) ? 'iPhone' : 'Desktop'
  };

  document.getElementById('telegramInfo').innerHTML = Object.entries(info)
    .map(([k,v])=>`<div class='glass info-card'><b>${k}</b><br>${v}</div>`)
    .join('');
}
</script></body>
</html>
