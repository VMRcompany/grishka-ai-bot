<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Гришка AI</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: radial-gradient(circle at top, #1c1c1e, #0f0f10 70%);
    color: white;
}

.app {
    max-width: 420px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
}

.glass {
    background: rgba(28,28,30,0.6);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border: 1px solid rgba(255,255,255,0.05);
}

.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px;
    position: sticky;
    top: 0;
    z-index: 10;
    border-radius: 0 0 20px 20px;
}

.top-btn {
    background: rgba(255,255,255,0.08);
    border: none;
    color: white;
    padding: 10px 18px;
    border-radius: 25px;
    font-size: 14px;
    cursor: pointer;
    transition: 0.2s;
}

.top-btn:active { transform: scale(0.92); }

.page {
    flex: 1;
    padding: 30px 22px 120px 22px;
    display: none;
}

.page.active {
    display: block;
    animation: fadeIn 0.3s ease;
}

.hero-title {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 18px;
}

.hero-text {
    font-size: 18px;
    line-height: 1.7;
    opacity: 0.95;
}

.big-button {
    width: 100%;
    padding: 20px;
    margin-top: 35px;
    border-radius: 32px;
    border: none;
    background: linear-gradient(90deg,#0088cc,#00bfff);
    color: white;
    font-weight: 600;
    font-size: 17px;
    cursor: pointer;
    transition: 0.2s;
    box-shadow: 0 0 35px rgba(0,136,204,0.5);
}

.big-button:active {
    transform: scale(0.93);
    background: #000;
    box-shadow: none;
}

.bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    margin: 0 auto;
    max-width: 420px;
    display: flex;
    justify-content: space-around;
    padding: 16px 0;
    border-radius: 20px 20px 0 0;
}

.nav-btn {
    background: none;
    border: none;
    color: #aaa;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-size: 12px;
    cursor: pointer;
    gap: 8px;
    transition: 0.2s;
}

.nav-btn.active { color:#00bfff; }
.nav-btn:active { transform: scale(0.9); }

.card {
    padding: 22px;
    border-radius: 26px;
    margin-bottom: 20px;
    font-size: 16px;
}

.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    display: none;
    justify-content: center;
    align-items: center;
}

.modal-content {
    width: 85%;
    padding: 25px;
    border-radius: 28px;
    text-align: center;
}

.small-black-btn {
    width: 100%;
    padding: 14px;
    border-radius: 25px;
    border: none;
    background: #000;
    color: white;
    font-size: 15px;
    margin-top: 20px;
    cursor: pointer;
}

@keyframes fadeIn {
    from {opacity:0; transform:translateY(10px);} 
    to {opacity:1; transform:translateY(0);} 
}
</style>
</head>
<body>

<div class="app">

    <div class="topbar glass">
        <button class="top-btn" onclick="closeApp()">Закрыть</button>
        <button class="top-btn" onclick="openMenu()">•••</button>
    </div>

    <!-- Главная -->
    <div id="home" class="page active">
        <div class="hero-title">Гришка AI — твой умный помощник</div>
        <div class="hero-text">
            Умный Telegram‑ассистент для текстов, идей, кода и решений.
            <br><br>
            Работает быстро, отвечает понятно и помогает разобраться
            даже в сложных задачах.
            <br><br>
            Нажми кнопку ниже и начни общение прямо сейчас.
        </div>

        <button class="big-button" onclick="openBot()">
            Перейти в Гришку AI
        </button>
    </div>

    <!-- Профиль -->
    <div id="profile" class="page">
        <div class="card glass">
            <strong style="font-size:18px;">Профиль аккаунта</strong><br><br>
            <div id="profileData">Загрузка данных...</div>
        </div>
    </div>

    <!-- Ещё -->
    <div id="settings" class="page">
        <div class="card glass">
            <strong style="font-size:18px;">Среда Telegram</strong><br><br>
            <div id="telegramInfo">Загрузка данных...</div>
        </div>
    </div>

</div>

<div class="bottom-nav glass">
    <button class="nav-btn active" onclick="switchPage('home', this)">
        <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22">
            <path d="M3 10L12 3l9 7v10a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/>
        </svg>
        Главная
    </button>
    <button class="nav-btn" onclick="switchPage('profile', this)">
        <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22">
            <path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5zm0 2c-4.4 0-8 2.2-8 5v1h16v-1c0-2.8-3.6-5-8-5z"/>
        </svg>
        Профиль
    </button>
    <button class="nav-btn" onclick="switchPage('settings', this)">
        <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22">
            <path d="M12 8a4 4 0 100 8 4 4 0 000-8zm8 4a7 7 0 00-.1-1l2.1-1.6-2-3.4-2.5 1a7 7 0 00-1.7-1L13.5 2h-3L9.2 5a7 7 0 00-1.7 1l-2.5-1-2 3.4L5.1 11a7 7 0 000 2l-2.1 1.6 2 3.4 2.5-1a7 7 0 001.7 1l1.3 3h3l1.3-3a7 7 0 001.7-1l2.5 1 2-3.4-2.1-1.6c.1-.3.1-.7.1-1z"/>
        </svg>
        Ещё
    </button>
</div>

<div id="menuModal" class="modal">
    <div class="modal-content glass">
        <strong style="font-size:18px;">Меню</strong><br><br>
        <button class="small-black-btn" onclick="openBot()">Перейти в Гришку AI</button>
        <button class="small-black-btn" onclick="closeMenu()">Закрыть</button>
    </div>
</div>

<script>
if (window.Telegram && Telegram.WebApp) {
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();
}

function switchPage(id, el){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    el.classList.add('active');
    if(id==='profile') loadProfile();
    if(id==='settings') loadTelegramInfo();
}

function openBot(){
    window.location.href = "https://t.me/GrishkaAiBot";
}

function closeApp(){
    if(window.Telegram?.WebApp){ Telegram.WebApp.close(); }
}

function openMenu(){ document.getElementById('menuModal').style.display='flex'; }
function closeMenu(){ document.getElementById('menuModal').style.display='none'; }

function loadProfile(){
    if(window.Telegram?.WebApp?.initDataUnsafe?.user){
        const u = Telegram.WebApp.initDataUnsafe.user;
        document.getElementById('profileData').innerHTML = `
        <b>Имя:</b> ${u.first_name || ''} ${u.last_name || ''}<br><br>
        <b>Username:</b> @${u.username || 'нет'}<br><br>
        <b>ID:</b> ${u.id}
        `;
    } else {
        document.getElementById('profileData').innerHTML = 'Открой Mini App внутри Telegram для отображения данных.';
    }
}

function loadTelegramInfo(){
    if(window.Telegram?.WebApp){
        const tg = Telegram.WebApp;
        document.getElementById('telegramInfo').innerHTML = `
        <b>Платформа:</b> ${tg.platform}<br><br>
        <b>Версия WebApp:</b> ${tg.version}<br><br>
        <b>Цветовая схема:</b> ${tg.colorScheme}<br><br>
        <b>Развернуто:</b> ${tg.isExpanded ? 'Да' : 'Нет'}
        `;
    } else {
        document.getElementById('telegramInfo').innerHTML = 'Информация доступна только внутри Telegram.';
    }
}
</script>

</body>
</html>
