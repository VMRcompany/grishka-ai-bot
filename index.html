<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Гришка AI</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:radial-gradient(circle at top,#1c1c1e,#0f0f10 70%);color:#fff}
.app{max-width:420px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding-bottom:95px}
.glass{background:rgba(28,28,30,.6);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,.05)}
.page{flex:1;padding:20px;display:none}.page.active{display:block}
.chat-box{height:380px;overflow:auto;border-radius:24px;padding:16px;margin-bottom:16px}
.msg{padding:12px 14px;border-radius:18px;margin:8px 0;max-width:80%;font-size:15px;line-height:1.4}
.user{background:#0088cc;margin-left:auto}.bot{background:#2a2a2d}
.input-row{display:flex;gap:10px}
.input{flex:1;padding:16px;border:none;border-radius:18px;background:#1f1f22;color:#fff;font-size:15px}
.send-btn{padding:0 18px;border:none;border-radius:18px;background:#00bfff;color:#fff;font-weight:700;cursor:pointer}
.section-title{font-size:20px;font-weight:700;margin:8px 0 14px}
.history{margin-top:18px}
.history-item{padding:14px;border-radius:18px;margin-bottom:10px;font-size:14px}
.profile-card{padding:24px;border-radius:28px;text-align:center}
.avatar{width:84px;height:84px;border-radius:50%;object-fit:cover;margin-bottom:14px;border:3px solid rgba(255,255,255,.15)}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;max-width:420px;margin:0 auto;display:flex;justify-content:space-around;padding:14px 0;border-radius:22px 22px 0 0}
.nav-btn{background:none;border:none;color:#aaa;display:flex;flex-direction:column;align-items:center;font-size:12px;gap:6px}.nav-btn.active{color:#00bfff}
</style>
</head>
<body>
<div class="app">
  <div id="home" class="page active">
    <div class="section-title">Гришка AI Чат</div>
    <div id="chatBox" class="chat-box glass">
      <div class="msg bot">Привет! Я Гришка AI 👋</div>
    </div>
    <div class="input-row">
      <input id="messageInput" class="input" placeholder="Напиши сообщение..." />
      <button class="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 2L11 13"/>
          <path d="M22 2L15 22L11 13L2 9L22 2Z"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="profile" class="page">
    <div class="profile-card glass">
      <img id="avatar" class="avatar" src="https://ui-avatars.com/api/?name=User&background=0088cc&color=fff&size=128" />
      <div id="profileData">Загрузка профиля...</div>
    </div>
  </div>
</div>

<div class="bottom-nav glass">
  <button class="nav-btn active" onclick="switchPage('home',this)">
    <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M3 10L12 3l9 7v10a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/></svg>
    Главная
  </button>
  <button class="nav-btn" onclick="switchPage('profile',this)">
    <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5zm0 2c-4.4 0-8 2.2-8 5v1h16v-1c0-2.8-3.6-5-8-5z"/></svg>
    Профиль
  </button>
  <button class="nav-btn" onclick="switchPage('settings',this)">
    <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M12 8a4 4 0 100 8 4 4 0 000-8zm8 4a7 7 0 00-.1-1l2.1-1.6-2-3.4-2.5 1a7 7 0 00-1.7-1L13.5 2h-3L9.2 5a7 7 0 00-1.7 1l-2.5-1-2 3.4L5.1 11a7 7 0 000 2l-2.1 1.6 2 3.4 2.5-1a7 7 0 001.7 1l1.3 3h3l1.3-3a7 7 0 001.7-1l2.5 1 2-3.4-2.1-1.6c.1-.3.1-.7.1-1z"/></svg>
    Ещё
  </button>
</div>

<div id="settings" class="page">
  <div class="profile-card glass">
    <div id="telegramInfo">Информация Telegram появится здесь</div>
  </div>
</div>

<script>
if(window.Telegram?.WebApp){Telegram.WebApp.ready();Telegram.WebApp.expand();}

function switchPage(id,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  if(id==='profile') loadProfile();
  if(id==='settings') loadTelegramInfo();
}

function sendMessage(){
  const input=document.getElementById('messageInput');
  const text=input.value.trim();
  if(!text) return;
  addMessage(text,'user');  input.value='';

  setTimeout(()=>{
    addMessage('Ответ от бота будет здесь после подключения backend API.','bot');
  },500);
}

function addMessage(text,type){
  const box=document.getElementById('chatBox');
  const div=document.createElement('div');
  div.className='msg '+type;
  div.textContent=text;
  box.appendChild(div);
  box.scrollTop=box.scrollHeight;
}

function loadProfile(){
  const user=window.Telegram?.WebApp?.initDataUnsafe?.user;
  if(user){
    document.getElementById('profileData').innerHTML=`<b>${user.first_name||''} ${user.last_name||''}</b><br><br>@${user.username||'нет'}<br>ID: ${user.id}`;
    if(user.photo_url) document.getElementById('avatar').src=user.photo_url;
  } else {
    document.getElementById('profileData').innerHTML='Открой внутри Telegram Mini App';
  }
}

function loadTelegramInfo(){
  const tg = window.Telegram?.WebApp;
  const user = tg?.initDataUnsafe?.user;
  if(tg){
    document.getElementById('telegramInfo').innerHTML = `
      <b>Платформа:</b> ${tg.platform || 'unknown'}<br><br>
      <b>Версия WebApp:</b> ${tg.version || 'unknown'}<br><br>
      <b>Цветовая схема:</b> ${tg.colorScheme || 'unknown'}<br><br>
      <b>Тема:</b> ${tg.themeParams ? 'Получена' : 'Нет'}<br><br>
      <b>Развернуто:</b> ${tg.isExpanded ? 'Да' : 'Нет'}<br><br>
      <b>Viewport Height:</b> ${tg.viewportHeight || 'unknown'}<br><br>
      <b>Stable Height:</b> ${tg.viewportStableHeight || 'unknown'}<br><br>
      <b>Имя:</b> ${user?.first_name || 'unknown'}<br><br>
      <b>Username:</b> @${user?.username || 'нет'}<br><br>
      <b>ID:</b> ${user?.id || 'unknown'}<br><br>
      <b>Premium:</b> ${user?.is_premium ? 'Да' : 'Нет'}<br><br>
      <b>Language:</b> ${user?.language_code || 'unknown'}
    `;
  } else {
    document.getElementById('telegramInfo').innerHTML='Информация доступна только внутри Telegram Mini App';
  }
}
</script>
</body>
</html>
